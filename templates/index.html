<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行规划助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        nav {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
        }

        nav h1 {
            font-size: 1.1em;
            color: #333;
            font-weight: 600;
        }

        nav span {
            margin-left: 12px;
            font-size: 13px;
            color: #999;
        }

        /* 主体区域 */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
        }

        /* 欢迎占位 */
        .placeholder {
            text-align: center;
            margin-top: 80px;
            color: #999;
        }

        .placeholder p {
            font-size: 15px;
            margin-bottom: 24px;
        }

        .example-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .example-item {
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .example-item:hover {
            border-color: #4a90e2;
            color: #4a90e2;
        }

        /* 消息 */
        .message {
            margin-bottom: 20px;
        }

        .message-user {
            display: flex;
            justify-content: flex-end;
        }

        .message-ai {
            display: flex;
            justify-content: flex-start;
        }

        .bubble {
            max-width: 72%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .message-user .bubble {
            background: #4a90e2;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-ai .bubble {
            background: white;
            color: #333;
            border: 1px solid #e8e8e8;
            border-bottom-left-radius: 4px;
        }

        /* 加载 */
        .typing {
            display: flex;
            gap: 4px;
            padding: 14px 16px;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #ccc;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* 底部输入 */
        footer {
            background: white;
            border-top: 1px solid #eee;
            padding: 16px 24px;
        }

        .input-wrap {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        .input-wrap input {
            flex: 1;
            height: 44px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrap input:focus {
            border-color: #4a90e2;
        }

        .input-wrap button {
            height: 44px;
            padding: 0 24px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-wrap button:hover {
            background: #357abd;
        }

        .input-wrap button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <nav>
        <h1>旅行规划助手</h1>
        <span>行程规划 · 景点查询 · 路线导航</span>
    </nav>

    <main id="chatArea">
        <div class="placeholder" id="placeholder">
            <p>你好，请问有什么可以帮您？</p>
            <div class="example-list">
                <div class="example-item" onclick="sendQuick('帮我规划北京3日游，预算3000元')">帮我规划北京3日游，预算3000元</div>
                <div class="example-item" onclick="sendQuick('保定有哪些值得去的景点')">保定有哪些值得去的景点</div>
                <div class="example-item" onclick="sendQuick('从天安门到颐和园怎么走')">从天安门到颐和园怎么走</div>
                <div class="example-item" onclick="sendQuick('推荐上海适合带孩子的地方')">推荐上海适合带孩子的地方</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="输入旅行需求..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </footer>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMsg(text, isUser) {
            const placeholder = document.getElementById('placeholder');
            if (placeholder) placeholder.remove();

            const div = document.createElement('div');
            div.className = `message message-${isUser ? 'user' : 'ai'}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const placeholder = document.getElementById('placeholder');
            if (placeholder) placeholder.remove();

            const div = document.createElement('div');
            div.className = 'message message-ai';
            div.id = 'typingMsg';
            div.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingMsg');
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMsg(text, true);
            userInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                hideTyping();
                addMsg(data.response, false);
            } catch (e) {
                hideTyping();
                addMsg('请求失败，请稍后重试。', false);
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        function sendQuick(text) {
            userInput.value = text;
            sendMessage();
        }
    </script>
</body>
</html>
